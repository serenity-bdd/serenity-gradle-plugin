name: Publish Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version to publish (leave empty to use gradle.properties)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Publish plugin
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ./gradlew publishPlugins -PnextVersion=${{ github.event.inputs.version }}
          else
            ./gradlew publishPlugins
          fi
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
